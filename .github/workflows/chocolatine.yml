name: chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-RUN-2-1-chocolatine-9.git"
  EXECUTABLES: "chocolatine"

jobs:
  check_compilation_and_coding_style:
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Run banana-check-repo
        run: banana-check-repo
      - name: Launch make
        timeout-minutes: 2
        run: CC=epiclang make 2>&1 | tee make_output.txt
      - name: Coding style errors
        run: |
          grep '\[Banana\]' make_output.txt | while IFS=: read -r file line _ msg; do
            code=$(echo "$msg" | grep -oE '\([A-Z0-9-]+\)' | tr -d '()')
            msg=$(echo "$msg" | sed 's/.*\] //' | sed "s/ ($code)//")
            echo "::error file=$file,line=$line::$code - $msg"
          done
      - name: Checks executables
        shell: bash
        run: |
          IFS=',' read -ra EXECS <<< "$EXECUTABLES"
          for exec in "${EXECS[@]}"; do
            exec=$(echo "$exec" | xargs)
            if [ ! -f "$exec" ]; then
              echo "::error file=$exec::Executable '$exec' not found"
              exit 1
            fi
            if [ ! -x "$exec" ]; then
              echo "::error file=$exec::'$exec' is not executable"
              exit 1
            fi
          done
      - name: Run make clean
        run: make clean

  run_tests:
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Launch make tests_run
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
          target_repo_url: ${{ env.MIRROR_SSH_URL }}